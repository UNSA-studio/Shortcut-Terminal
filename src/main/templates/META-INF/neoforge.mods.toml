modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}

§c⚠ 本模组需要安装 §n帕秋莉手册 (Patchouli)§r §c作为前置！否则将无法启动。'''

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

# 正确的强制依赖写法：type = "required"（不是 mandatory = true）
[[dependencies.${mod_id}]]
    modId = "patchouli"
    type = "required"
    versionRange = "[1.21.1-93,)"
    ordering = "AFTER"
    side = "BOTH"
