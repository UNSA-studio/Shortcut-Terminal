modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
logoFile = "logo.png"

[[mods]]
modId = "shortcutterminal"
version = "1.0.0"
displayName = "Shortcut Terminal"
authors = "UNSA-STUDIO"
description = '''
Shortcut Terminal - Linux commands in Minecraft!

Features:
- /ST Help - List all available commands
- /ST ls, mkdir, touch, rm, cat - Basic file operations
- /ST cd - Change directory (restricted to user folder)
- /ST User - Admin command to manage players
- /ST open terminal page - Enter terminal mode
- /ST refresh bf - Refresh binary plugins

§c⚠ 本模组需要安装 §n帕秋莉手册 (Patchouli)§r §c作为前置！否则将无法启动。
'''

[[dependencies.shortcutterminal]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.1,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.shortcutterminal]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21,1.21.2)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.shortcutterminal]]
    modId = "patchouli"
    type = "required"
    versionRange = "[1.21.1-93,)"
    ordering = "AFTER"
    side = "BOTH"
