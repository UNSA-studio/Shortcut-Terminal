plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
    id 'com.gradleup.shadow' version '9.0.0-beta4'
}

version = '1.0.1(Beta)'
group = 'unsa.st.com'
base.archivesName = 'shortcutterminal'
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
    maven { url = 'https://maven.blamejared.com' }
    maven { url = 'https://jitpack.io' }
}

dependencies {
    compileOnly "vazkii.patchouli:Patchouli:1.21.1-93-NEOFORGE:api"
    runtimeOnly "vazkii.patchouli:Patchouli:1.21.1-93-NEOFORGE"
    implementation 'org.apache.commons:commons-compress:1.26.0'
    implementation 'org.tukaani:xz:1.9'
    // MP3 库暂时禁用
    // implementation 'com.github.umjammer:jlayer:1.0.3'
}

// ================= Shadow 配置（根治冲突） =================
shadowJar {
    dependencies {
        include(dependency("org.tukaani:xz:.*"))
        include(dependency("org.apache.commons:commons-compress:.*"))
    }
    archiveClassifier = ''

    // 只处理运行时 classpath，并且排除 NeoForge/MC 运行环境
    configurations = [project.configurations.runtimeClasspath]

    // 禁止打包任何 NeoForge、MC 和模块描述符
    exclude 'module-info.class'
    exclude 'META-INF/versions/**/module-info.class'
    exclude 'cpw/**'
    exclude 'net/neoforged/**'
    exclude 'net/minecraft/**'

    // 重定位我们自己的第三方库
    relocate 'org.tukaani.xz', 'unsa.st.com.shortcutterminal.shadow.xz'
    relocate 'com.electronwill.nightconfig', 'unsa.st.com.shortcutterminal.shadow.nightconfig'
    relocate 'org.apache.commons.compress', 'unsa.st.com.shortcutterminal.shadow.compress'

    mergeServiceFiles()

    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'

    manifest {
        attributes 'Automatic-Module-Name': 'unsa.st.com.shortcutterminal'
    }
}

// 把我们的源码也纳入 Shadow
tasks.named('shadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    from sourceSets.main.output
}

// 让标准 jar 完成后立刻执行 shadowJar，确保 NeoForge 插件拿到的是干净包
jar.finalizedBy('shadowJar')

// 最终的 assemble 也依赖 shadowJar
assemble.dependsOn shadowJar
// ==========================================================

neoForge {
    version = '21.1.219'
    runs {
        client { client() }
        server { server() }
    }
    mods {
        shortcutterminal {
            sourceSet(sourceSets.main)
        }
    }
}

processResources {
    var replaceProperties = [
        minecraft_version      : '1.21.1',
        minecraft_version_range: "[1.21,1.21.2)",
        neo_version            : '21.1.219',
        neo_version_range      : "[21.1,)",
        loader_version_range   : "[4,)",
        mod_id                 : 'shortcutterminal',
        mod_name               : 'Shortcut Terminal',
        mod_license            : 'MIT',
        mod_version            : '1.0.1(Beta)',
        mod_authors            : 'UNSA-STUDIO',
        mod_description        : 'Shortcut Terminal - Linux commands in Minecraft!'
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
