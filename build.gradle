plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
}

version = '1.0.0'
group = 'unsa.st.com'
base.archivesName = 'st'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
    maven { url = 'https://maven.blamejared.com' } // Patchouli 仓库
}

dependencies {
    // Patchouli 前置 (NeoForge 1.21.1 版本)
    implementation "vazkii.patchouli:Patchouli:1.21.1-88-NEOFORGE"
}

neoForge {
    version = '21.1.219'

    runs {
        client { client() }
        server { server() }
    }

    mods {
        st {
            sourceSet(sourceSets.main)
        }
    }
}

processResources {
    var replaceProperties = [
        minecraft_version      : '1.21.1',
        minecraft_version_range: "[1.21,1.21.2)",
        neo_version            : '21.1.219',
        neo_version_range      : "[21.1,)",
        loader_version_range   : "[4,)",
        mod_id                 : 'st',
        mod_name               : 'Shortcut Terminal',
        mod_license            : 'MIT',
        mod_version            : '1.0.0',
        mod_authors            : 'UNSA-STUDIO',
        mod_description        : 'Shortcut Terminal - Linux commands in Minecraft!'
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
